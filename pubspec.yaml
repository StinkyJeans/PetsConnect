name: petsconnect
description: "PetsConnect - Social platform for pet lovers."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # HTTP / API
  dio: ^5.8.0
  flutter_secure_storage: ^9.2.4

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # UI
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.3.1

  # Media
  image_picker: ^1.1.2
  video_player: ^2.9.2
  flutter_image_compress: ^2.4.0

  # Auth
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.6

  # Utils
  intl: ^0.20.2
  timeago: ^3.7.0
  uuid: ^4.5.1
  path: ^1.9.1
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  equatable: ^2.0.7
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  freezed: ^3.0.0
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
